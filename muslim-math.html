<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>Muslim Math • Скоро</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', Roboto, sans-serif;
      padding: 20px;
      background: linear-gradient(145deg, #fce4ec, #c8e6c9);
      text-align: center;
    }
    .container {
      max-width: 600px;
      background: rgba(255,255,255,0.7);
      backdrop-filter: blur(10px);
      padding: 40px 30px;
      border-radius: 40px;
      border: 1px solid rgba(255,255,255,0.5);
    }
    .emoji-big { font-size: 4rem; display: block; margin-bottom: 16px; }
    h1 { font-size: 2rem; color: #2e7d32; margin-bottom: 10px; }
    p { font-size: 1.1rem; color: #4a2c3a; margin-bottom: 20px; }
    .back-link {
      display: inline-block;
      padding: 10px 28px;
      background: #2e7d32;
      color: white;
      border-radius: 30px;
      text-decoration: none;
      transition: 0.2s;
    }
    .back-link:hover { background: #1b5e20; transform: scale(1.02); }
  </style>
</head>
<body>
  <div class="container">
    <span class="emoji-big">🕌</span>
    <h1>Muslim Math</h1>
    <p>Страница в разработке. Здесь будут уроки про риск, барака, садака, награду, закят и наследство.</p>
    <a href="index.html" class="back-link">← На главную</a>
  </div>
</body>
</html>
